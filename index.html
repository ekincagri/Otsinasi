async function requestPushPermission(customerId) {
  if(!messaging) return null;
  try {
    const permission = await Notification.requestPermission();
    if(permission !== "granted") { console.log("Notification permission denied"); return null; }
    
    // Register service worker first
    let swReg = null;
    try {
      swReg = await navigator.serviceWorker.register("/firebase-messaging-sw.js");
      await navigator.serviceWorker.ready;
      console.log("SW registered:", swReg.scope);
    } catch(e) { console.log("SW error:", e); }
    
    const token = await getToken(messaging, {
      vapidKey: "BLO3YQkSXReSa7f2anUOKZzexAAfIk9sAtZC5PBcMJQQKzeDD9KhoCt2KI7J7Jql5akkqdwEUHTISIHBGRYzmMA",
      serviceWorkerRegistration: swReg || undefined
    });
    
    console.log("FCM Token obtained:", token ? "YES ("+token.substring(0,20)+"...)" : "NO");
    
    // Save token to Firestore
    if(token && customerId && customersCache[customerId]) {
      const updated = {...customersCache[customerId], fcmToken: token};
      await saveCustomerDB(updated);
      customersCache[customerId] = updated;
      state.customers = {...customersCache};
      console.log("FCM token saved to Firestore for:", customerId);
    }
    return token;
  } catch(e) { console.log("Push token error:", e); return null; }
}

// Listen for foreground messages
if(messaging) {
  onMessage(messaging, payload => {
    const { title, body } = payload.notification || {};
    if(title) {
      // Show in-app notification banner
      showInAppNotif(title, body);
    }
  });
}

function showInAppNotif(title, body) {
  const existing = document.getElementById("push-banner");
  if(existing) existing.remove();
  const banner = document.createElement("div");
  banner.id = "push-banner";
  Object.assign(banner.style, {
    position:"fixed", top:"0", left:"0", right:"0", zIndex:"9999",
    background:"linear-gradient(135deg,#f5c800,#c98f00)", color:"#1a0e00",
    padding:"14px 20px", textAlign:"center", fontSize:"14px", fontWeight:"bold",
    cursor:"pointer", boxShadow:"0 4px 20px rgba(245,200,0,0.4)"
  });
  banner.innerHTML = `🔔 ${title}: ${body}`;
  banner.onclick = () => banner.remove();
  document.body.appendChild(banner);
  setTimeout(() => banner.remove(), 6000);
}

async function saveCustomerDB(c) { try { await setDoc(doc(db,"customers",c.id),c); } catch(e) { console.error(e); } }
async function loadCustomersDB() {
  try { const snap=await getDocs(collection(db,"customers")); const r={}; snap.forEach(d=>{r[d.id]=d.data();}); return r; } catch(e) { return {}; }
}
async function loadNotifsDB() {
  try { const snap=await getDocs(collection(db,"notifications")); const r=[]; snap.forEach(d=>r.push(d.data())); return r.sort((a,b)=>(b.timestamp||0)-(a.timestamp||0)); } catch(e) { return []; }
}
async function saveNotifDB(n) { try { await setDoc(doc(db,"notifications",n.id),n); } catch(e) {} }
function listenCustomers(cb) { return onSnapshot(collection(db,"customers"),snap=>{const r={};snap.forEach(d=>{r[d.id]=d.data();});cb(r);}); }

// Konum
const RESTORAN_LAT = 37.0007;
const RESTORAN_LNG = 35.3210;
const MAX_DISTANCE_METERS = 100;

function getDistance(lat1,lng1,lat2,lng2){
  const R=6371000,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function checkLocation(){
  return new Promise((resolve,reject)=>{
    if(!navigator.geolocation){reject("Tarayıcınız konum özelliğini desteklemiyor.");return;}
    // First check permission status
    if(navigator.permissions){
      navigator.permissions.query({name:"geolocation"}).then(perm=>{
        if(perm.state==="denied"){
          reject("Konum izni reddedildi. Lütfen telefon ayarlarından konum iznini açın.");
          return;
        }
        // Request location (will show popup if not yet granted)
        navigator.geolocation.getCurrentPosition(
          pos=>{
            const dist=getDistance(pos.coords.latitude,pos.coords.longitude,RESTORAN_LAT,RESTORAN_LNG);
            if(dist<=MAX_DISTANCE_METERS) resolve(dist);
            else reject(`Restorana çok uzaksınız (${Math.round(dist)}m). Check-in için restoranda olmanız gerekiyor. 📍`);
          },
          err=>{
            if(err.code===1) reject("Konum izni reddedildi. Ayarlar > Gizlilik > Konum bölümünden izin verin.");
            else if(err.code===2) reject("Konum alınamadı. Lütfen GPS'inizin açık olduğundan emin olun.");
            else reject("Konum alınamadı. Tekrar deneyin.");
          },
          {enableHighAccuracy:true,timeout:15000,maximumAge:0}
        );
      });
    } else {
      // Fallback for browsers without permissions API
      navigator.geolocation.getCurrentPosition(
        pos=>{
          const dist=getDistance(pos.coords.latitude,pos.coords.longitude,RESTORAN_LAT,RESTORAN_LNG);
          if(dist<=MAX_DISTANCE_METERS) resolve(dist);
          else reject(`Restorana çok uzaksınız (${Math.round(dist)}m). Check-in için restoranda olmanız gerekiyor. 📍`);
        },
        err=>{
          if(err.code===1) reject("Konum izni reddedildi. Ayarlar > Gizlilik > Konum bölümünden izin verin.");
          else reject("Konum alınamadı. Tekrar deneyin.");
        },
        {enableHighAccuracy:true,timeout:15000,maximumAge:0}
      );
    }
  });
}

let customersCache={};
let notifsCache=[];
let unsubListener=null;

const todayMidnight=()=>{const d=new Date();d.setHours(0,0,0,0);return d.getTime();};
const todayStr=()=>new Date().toLocaleDateString("tr-TR");

let state={
  page:"home",customers:{},currentId:null,
  adminUnlocked:false,adminTab:"stats",chartView:"daily",
  showLogin:false,notifications:[],
  loginError:"",formError:"",adminError:"",
  notifSent:false,banner:null,regType:"phone",
  checkInPopup:null,loading:false,locationMsg:null,
  saveLogin:true,
};

function setState(p){Object.assign(state,p);render();}
async function updateCustomer(c){customersCache[c.id]=c;state.customers={...customersCache};await saveCustomerDB(c);render();}

async function checkBirthdays(){
  const today=new Date();
  const dd=String(today.getDate()).padStart(2,"0");
  const mm=String(today.getMonth()+1).padStart(2,"0");
  const todayDDMM=dd+"/"+mm;
  const birthdayCustomers=Object.values(customersCache).filter(c=>c.birthday===todayDDMM);
  if(birthdayCustomers.length===0)return;
  // Check if birthday notif already sent today
  const lastBdayNotif=localStorage.getItem("ot_bday_notif_date");
  if(lastBdayNotif===todayStr())return;
  // Send push to birthday customers
  const tokens=birthdayCustomers.map(c=>c.fcmToken).filter(Boolean);
  const title="🎂 Doğum Gününüz Kutlu Olsun!";
  const body="Bugün pastanız bizden 😊 Sizi görmek için sabırsızlanıyoruz!";
  if(tokens.length>0){
    try{
      await fetch("/.netlify/functions/send-push",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({title,body,tokens})
      });
      localStorage.setItem("ot_bday_notif_date",todayStr());
      console.log("Birthday notifications sent to:",tokens.length,"customers");
    }catch(e){console.error("Birthday push error:",e);}
  }
  // Also show in-app banner if current user has birthday
  const currentUser=customersCache[localStorage.getItem("ot_current_id")];
  if(currentUser&&currentUser.birthday===todayDDMM){
    setTimeout(()=>showInAppNotif("🎂 Doğum Gününüz Kutlu Olsun!","Bugün pastanız bizden 😊"),2000);
  }
}

async function initApp(){
  customersCache=await loadCustomersDB();
  notifsCache=await loadNotifsDB();
  const savedId=localStorage.getItem("ot_current_id");
  if(savedId&&customersCache[savedId]){state.currentId=savedId;state.page="profile";}
  state.customers=customersCache;
  state.notifications=notifsCache;
  render();
  setTimeout(checkURLParam,100);
  // Check birthdays on app open
  setTimeout(checkBirthdays,3000);
}

function checkURLParam(){
  const params=new URLSearchParams(window.location.search);
  const masa=params.get("masa");
  if(!masa)return;
  window.history.replaceState({},document.title,window.location.pathname);
  const savedId=localStorage.getItem("ot_current_id");
  if(savedId&&state.customers[savedId]){
    handleCheckIn(savedId);
  }else{
    localStorage.setItem("ot_pending_masa",masa);
    setState({showLogin:true});
  }
}

async function handleCheckIn(id){
  const c=state.customers[id];
  if(!c)return;
  if(c.lastVisitTs&&c.lastVisitTs>=todayMidnight()){
    setState({checkInPopup:{type:"warn",name:c.name,msg:"Bugün zaten check-in yaptınız! Sizi görmek güzel 😊",visits:c.visits,discountsEarned:c.discountsEarned}});
    return;
  }
  // Konum kontrolü
  setState({locationMsg:{status:"checking",text:"📍 Konumunuz kontrol ediliyor..."}});
  try{
    const dist=await checkLocation();
    setState({locationMsg:{status:"ok",text:`✅ Konum onaylandı (${Math.round(dist)}m)`}});
    setTimeout(()=>setState({locationMsg:null}),2000);
  }catch(err){
    setState({locationMsg:{status:"fail",text:`❌ ${err}`}});
    setTimeout(()=>setState({locationMsg:null}),5000);
    return;
  }
  const nv=c.visits+1;
  const earned=nv%VISITS_FOR_DISC===0;
  const updated={...c,visits:nv,lastVisit:todayStr(),lastVisitTs:Date.now(),discountsEarned:earned?c.discountsEarned+1:c.discountsEarned};
  await updateCustomer(updated);
  setState({
    currentId:id,page:"profile",locationMsg:null,
    checkInPopup:{
      type:earned?"discount":"success",
      name:c.name,
      msg:earned?`🎉 Tebrikler! %${DISCOUNT_PCT} indirim kazandınız!`:`Hoş geldiniz ${c.name}! Check-in yapıldı.`,
      visits:nv,discountsEarned:updated.discountsEarned,earned,
    }
  });
}

function drawQR(canvas,value){
  let h=0;
  for(let i=0;i<value.length;i++){h=((h<<5)-h)+value.charCodeAt(i);h|=0;}
  const size=140,cs=size/21;
  canvas.width=canvas.height=size;
  const ctx=canvas.getContext("2d");
  ctx.fillStyle="#fff";ctx.fillRect(0,0,size,size);
  ctx.fillStyle="#1a1200";
  for(let r=0;r<21;r++)for(let c=0;c<21;c++){
    let on;
    if((r<7&&c<7)||(r<7&&c>13)||(r>13&&c<7)){
      const out=r===0||r===6||c===0||c===6||(r>13&&(r===14||r===20||c===0||c===6))||(r<7&&c>13&&(r===0||r===6||c===14||c===20));
      const inn=(r>=2&&r<=4&&c>=2&&c<=4)||(r>=2&&r<=4&&c>=16&&c<=18)||(r>=16&&r<=18&&c>=2&&c<=4);
      on=out||inn;
    }else{on=Math.abs((h*(r+1)*(c+1)+r*7+c*13))%3===0;}
    if(on)ctx.fillRect(c*cs,r*cs,cs,cs);
  }
}

function getStats(){
  const all=Object.values(state.customers),now=new Date();
  const day30=new Date(now-30*864e5);
  const active30=all.filter(c=>{if(!c.lastVisit)return false;const [d,m,y]=c.lastVisit.split(".").map(Number);return new Date(y,m-1,d)>=day30;}).length;
  const totalVisits=all.reduce((s,c)=>s+c.visits,0);
  const totalDiscounts=all.reduce((s,c)=>s+c.discountsEarned,0);
  const days=Array.from({length:7},(_,i)=>{const d=new Date(now-(6-i)*864e5);return {label:d.toLocaleDateString("tr-TR",{weekday:"short"}),value:all.filter(c=>c.lastVisit===d.toLocaleDateString("tr-TR")).length};});
  const weeks=Array.from({length:4},(_,i)=>{const ws=new Date(now-(3-i)*7*864e5-6*864e5),we=new Date(now-(3-i)*7*864e5+864e5);return {label:`H${i+1}`,value:all.filter(c=>{if(!c.lastVisit)return false;const [d,m,y]=c.lastVisit.split(".").map(Number);const dt=new Date(y,m-1,d);return dt>=ws&&dt<=we;}).length};});
  return {total:all.length,active30,totalVisits,totalDiscounts,days,weeks};
}

const el=(tag,attrs={},html="")=>{const e=document.createElement(tag);Object.entries(attrs).forEach(([k,v])=>{if(k==="class")e.className=v;else if(k==="style")Object.assign(e.style,v);else e[k]=v;});if(html)e.innerHTML=html;return e;};

function renderChart(data){
  const max=Math.max(...data.map(d=>d.value),1);
  const wrap=el("div",{class:"chart-wrap"});
  data.forEach(d=>{const col=el("div",{class:"bar-col"});const inner=el("div",{class:"bar-inner"});const fill=el("div",{class:"bar-fill"});fill.style.height=d.value>0?`${(d.value/max)*100}%`:"0px";inner.appendChild(fill);col.appendChild(inner);col.appendChild(el("div",{class:"bar-lbl"},d.label));wrap.appendChild(col);});
  return wrap;
}

async function doRegister(){
  const name=document.getElementById("reg-name")?.value.trim();
  const contactVal=document.getElementById("reg-contact")?.value.trim();
  if(!name||!contactVal){setState({formError:"Lütfen tüm alanları doldurun."});return;}
  const key=contactVal.replace(/\s/g,"");
  if(state.customers[key]){setState({formError:"Bu bilgi zaten kayıtlı."});return;}
  const birthday=document.getElementById("reg-birthday")?.value.trim();
  if(!birthday||!/^\d{2}\/\d{2}$/.test(birthday)){setState({formError:"Lütfen doğum tarihinizi GG/AA formatında girin (örn: 15/03).",loading:false});return;}
  const c={id:key,name,contact:key,contactType:"phone",visits:0,discountsEarned:0,joinDate:todayStr(),lastVisit:null,lastVisitTs:null,birthday};
  setState({loading:true});
  await updateCustomer(c);
  if(state.saveLogin) localStorage.setItem("ot_current_id",key);
  const pendingMasa=localStorage.getItem("ot_pending_masa");
  if(pendingMasa){localStorage.removeItem("ot_pending_masa");setState({currentId:key,page:"profile",formError:"",loading:false});setTimeout(()=>handleCheckIn(key),100);}
  else setState({currentId:key,page:"profile",formError:"",loading:false});
  // Request push permission and save token
  setTimeout(()=>requestPushPermission(key),1000);
}

async function doLogin(){
  const val=document.getElementById("login-contact")?.value.replace(/\s/g,"");
  const save=document.getElementById("save-login-check")?.checked;
  setState({loading:true});
  customersCache=await loadCustomersDB();
  state.customers=customersCache;
  if(!state.customers[val]){setState({loginError:"Bu bilgi kayıtlı değil.",loading:false});return;}
  if(save) localStorage.setItem("ot_current_id",val);
  else localStorage.removeItem("ot_current_id");
  const pendingMasa=localStorage.getItem("ot_pending_masa");
  if(pendingMasa){localStorage.removeItem("ot_pending_masa");setState({currentId:val,page:"profile",showLogin:false,loginError:"",loading:false});setTimeout(()=>handleCheckIn(val),100);}
  else setState({currentId:val,page:"profile",showLogin:false,loginError:"",loading:false});
  // Request push permission and save token
  setTimeout(()=>requestPushPermission(val),1000);
}

async function doSendNotif(){
  const title=document.getElementById("notif-title")?.value.trim();
  const body=document.getElementById("notif-body")?.value.trim();
  if(!title||!body)return;
  const notif={id:Date.now().toString(),title,body,date:todayStr(),time:new Date().toLocaleTimeString("tr-TR",{hour:"2-digit",minute:"2-digit"}),timestamp:Date.now(),readBy:[]};
  await saveNotifDB(notif);
  notifsCache=[notif,...notifsCache];
  state.notifications=notifsCache;
  // Get all FCM tokens from customers
  const allTokens=Object.values(customersCache).map(c=>c.fcmToken).filter(Boolean);
  let pushResult="";
  if(allTokens.length>0){
    try{
      const res=await fetch("/.netlify/functions/send-push",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({title,body,tokens:allTokens})
      });
      const data=await res.json();
      pushResult=` (${data.sent||0}/${allTokens.length} telefona ulaştı)`;
    }catch(e){console.error("Push send error:",e);}
  }else{
    // Fallback: show native notification
    if(Notification.permission==="granted"){
      new Notification(`🌿 OT Şinasi: ${title}`,{body,icon:"/icon-192.png",badge:"/icon-72.png"});
    }
  }
  if(document.getElementById("notif-title"))document.getElementById("notif-title").value="";
  if(document.getElementById("notif-body"))document.getElementById("notif-body").value="";
  setState({notifSent:true,notifResult:pushResult});
  setTimeout(()=>setState({notifSent:false,notifResult:""}),4000);
}

  }

  if(state.adminTab==="customers"){
    const cCard=el("div",{class:"card",style:{padding:"0",overflow:"hidden"}});
    cCard.innerHTML=`<div class="section-hdr">Tüm Müşteriler (${all.length}) <span style="font-size:11px;color:#64dc64">● Canlı</span></div>`;
    if(all.length===0)cCard.innerHTML+=`<div style="padding:40px;text-align:center;color:rgba(255,248,225,0.5)">Henüz kayıtlı müşteri yok</div>`;
    else all.sort((a,b)=>b.visits-a.visits).forEach((c,i)=>{
      const isDisc=c.visits%VISITS_FOR_DISC===0&&c.visits>0;
      const [d,m,y]=(c.lastVisit||"").split(".").map(Number);
      const days=c.lastVisit?Math.floor((Date.now()-new Date(y,m-1,d))/864e5):null;
      const row=el("div",{class:`list-row${i%2===1?" alt":""}`});
      row.innerHTML=`<div><div style="font-weight:bold;margin-bottom:2px">${c.name}${c.birthday?" 🎂":""}</div><div style="font-size:11px;color:rgba(255,248,225,0.5)">${c.contact} · ${c.birthday||""}${c.birthday?" · ":""}${days!=null?days+" gün önce":"Ziyaret yok"}</div></div><div style="text-align:center"><div style="color:#f5c800;font-weight:bold;font-size:15px">${c.visits}</div><div style="font-size:10px;color:rgba(255,248,225,0.5)">ziyaret</div></div><div style="text-align:center"><div style="color:#64dc64;font-weight:bold;font-size:15px">${c.discountsEarned}</div><div style="font-size:10px;color:rgba(255,248,225,0.5)">indirim</div></div><div><span class="badge ${isDisc?"on":"off"}">${isDisc?"🎁 İndirim":`${c.visits%VISITS_FOR_DISC}/${VISITS_FOR_DISC}`}</span></div>`;
      cCard.appendChild(row);
    });
    main.appendChild(cCard);
  }

  if(state.adminTab==="notifications"){
    const nCard=el("div",{class:"card",style:{marginBottom:"16px"}});
    nCard.innerHTML=`<div class="title" style="font-size:16px">🔔 Bildirim Gönder</div><div class="subtitle">Uygulamayı açık olan müşterilere anlık bildirim gider.</div>`;
    const ti=el("input",{type:"text",placeholder:"Başlık (örn: Bugün %10 indirim!)",id:"notif-title"});
    const bi=el("textarea",{placeholder:"Mesaj içeriği...",id:"notif-body"});
    const sb=el("button",{class:"btn"},state.notifSent?`✅ Gönderildi!${state.notifResult||""}`:"📤 Tüm Telefonlara Gönder");sb.onclick=doSendNotif;
    nCard.appendChild(ti);nCard.appendChild(bi);nCard.appendChild(sb);main.appendChild(nCard);
    const hCard=el("div",{class:"card",style:{padding:"0",overflow:"hidden"}});
    hCard.innerHTML=`<div class="section-hdr">Gönderilen Bildirimler (${state.notifications.length})</div>`;
    if(state.notifications.length===0)hCard.innerHTML+=`<div style="padding:40px;text-align:center;color:rgba(255,248,225,0.5);font-size:13px">Henüz bildirim gönderilmedi</div>`;
    else state.notifications.forEach((n,i)=>{hCard.innerHTML+=`<div class="notif-item"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><div style="font-weight:bold;font-size:13px">${n.title}</div><div style="font-size:10px;color:rgba(255,248,225,0.3)">${n.date} ${n.time}</div></div><div style="font-size:12px;color:rgba(255,248,225,0.5);margin-bottom:4px">${n.body}</div></div>`;});
    main.appendChild(hCard);
  }

  if(state.adminTab==="masa"){
    const info=el("div",{class:"card",style:{marginBottom:"16px"}});
    info.innerHTML=`<div class="title" style="font-size:16px">📋 Masa QR Kodları</div><div class="subtitle">Her masaya ayrı QR koyun.</div><div style="font-size:13px;color:rgba(255,248,225,0.6);line-height:1.8;margin-top:8px">🔸 Müşteri QR okutunca uygulama açılır<br>🔸 📍 Konum doğrulanır (30m yarıçap)<br>🔸 Giriş yapmışsa → otomatik check-in<br>🔸 Giriş yapmamışsa → kayıt/giriş sonra check-in</div>`;
    main.appendChild(info);
    for(let i=1;i<=8;i++){
      const masaUrl=`${APP_URL}?masa=${i}`;
      const mCard=el("div",{class:"card",style:{marginBottom:"14px",textAlign:"center",padding:"20px"}});
      mCard.innerHTML=`<div style="font-size:16px;font-weight:bold;color:#f5c800;margin-bottom:12px">🪑 Masa ${i}</div><div style="display:inline-block;padding:10px;background:#fff;border-radius:12px"><canvas id="masa-qr-${i}"></canvas></div><div style="font-size:10px;color:rgba(255,248,225,0.3);margin-top:8px">${masaUrl}</div>`;
      main.appendChild(mCard);
      setTimeout(()=>{const c=document.getElementById(`masa-qr-${i}`);if(c)drawQR(c,masaUrl);},i*50);
    }
  }
  app.appendChild(main);
}

// Request notification permission on load
if("Notification" in window && Notification.permission === "default") {
  setTimeout(() => Notification.requestPermission(), 3000);
}

initApp();
</script>
</body>
</html>
